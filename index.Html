<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiore Perfume</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

header{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(to bottom,#000,#1a1a1a);
}

h1{
    font-size:70px;
    color:gold;
}

p{
    margin-top:15px;
    font-size:22px;
    color:#ddd;
}

.price{
    margin-top:20px;
    font-size:40px;
    color:#00ff88;
    font-weight:bold;
}

button{
    margin-top:30px;
    padding:15px 40px;
    border:none;
    border-radius:10px;
    background:gold;
    color:black;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

section{
    max-width:900px;
    margin:auto;
    padding:60px 20px;
    text-align:center;
}

.features{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

.card{
    background:#1d1d1d;
    padding:25px;
    border-radius:15px;
    width:240px;
}

footer{
    text-align:center;
    padding:20px;
    background:#000;
    color:#aaa;
}
</style>

</head>

<body>

<header>
    <h1>FIORE</h1>
    <p>رائحة أنيقة تدوم طويلًا وتترك انطباعًا لا يُنسى.</p>

    <div class="price">$10</div>

    <button onclick="alert('شكراً لاهتمامك بعطر Fiore!')">
        اشترِ الآن
    </button>
</header>

<section>

<h2 style="color:gold;">لماذا Fiore؟</h2>

<div class="features">

<div class="card">
<h3>ثبات ممتاز</h3>
<p>رائحة تدوم لساعات طويلة.</p>
</div>

<div class="card">
<h3>أناقة</h3>
<p>مناسب للعمل والمناسبات.</p>
</div>

<div class="card">
<h3>سعر رائع</h3>
<p>فقط 10 دولار.</p>
</div>

</div>

</section>

<footer>
© 2026 Fiore Perfume - جميع الحقوق محفوظة
</footer>

</body>
</html>
